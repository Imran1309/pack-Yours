  <!-- Balloon Envelope (Chat Bubble Shape) -->
  <path d="M50 10 C 25 10 10 30 10 55 C 10 75 25 90 40 90 L 40 95 L 60 95 L 60 90 C 75 90 90 75 90 55 C 90 30 75 10 50 10 Z" fill="url(#skyGrad)"/>
  
