<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6" /> <!-- Blue -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
  </defs>
  
  <circle cx="50" cy="50" r="50" fill="white" />
  <circle cx="50" cy="50" r="45" fill="url(#dGrad)"/>
  
  <!-- Abstract 'D' formed by flight path -->
  <path d="M30 25 V 75" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <path d="M30 25 H 40 C 70 25 80 40 80 50 C 80 60 70 75 40 75 H 30" stroke="white" stroke-width="8" stroke-linecap="round" fill="none"/>
  
  <!-- Plane element interrupting the D -->
  <path d="M80 50 L 95 40 L 85 60 Z" fill="white"/>
</svg>
