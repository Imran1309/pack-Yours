<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="swirlGrad" x1="0" y1="100" x2="100" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8b5cf6" /> <!-- Violet -->
      <stop offset="50%" stop-color="#d946ef" /> <!-- Fuchsia -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Main Bubble Body with heavy gradient -->
  <path d="M50 5 C25 5 5 25 5 50 C5 75 25 95 50 95 C75 95 95 75 95 50 C95 25 75 5 50 5 Z" fill="url(#swirlGrad)" />
  
  <!-- Chat Bubble Tail -->
  <path d="M20 75 Q10 85 5 95 L30 85" fill="url(#swirlGrad)" stroke="none"/>

  <!-- Inner Robot Face Outline -->
  <g stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Head Shape -->
    <path d="M25 45 V40 A 25 25 0 0 1 75 40 V45" />
    
    <!-- Antenna -->
    <path d="M50 15 V10" stroke-width="3"/>
    <circle cx="50" cy="8" r="3" fill="white" stroke="none"/>
    
    <!-- Face/Cheeks -->
    <path d="M25 45 V55 A 10 10 0 0 0 35 65" />
    <path d="M75 45 V55 A 10 10 0 0 1 65 65" />

    <!-- Eyes -->
    <path d="M35 45 Q40 40 45 45" stroke-width="3"/>
    <path d="M55 45 Q60 40 65 45" stroke-width="3"/>
  </g>
  
  <!-- Plane Integration (Smile/Chin Swoosh) -->
  <path d="M35 65 Q 50 75 65 55 L 75 45" stroke="white" stroke-width="3" stroke-linecap="round" />
  <path d="M70 50 L 80 40 L 78 52 L 70 50 Z" fill="white" stroke="none" />
</svg>
