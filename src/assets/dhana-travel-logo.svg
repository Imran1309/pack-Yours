<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mainGradient" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#db2777"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background Circle with Gradient -->
  <circle cx="50" cy="50" r="50" fill="url(#mainGradient)"/>
  
  <!-- Stylized Paper Plane / Arrow -->
  <g transform="translate(50, 50) scale(0.5) translate(-50, -50)">
    <path d="M10,50 L90,10 L50,90 L40,60 L10,50 Z" fill="white" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <path d="M40,60 L90,10" stroke="#db2777" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- "D" curve suggesting travel path -->
  <path d="M25,50 Q25,25 50,25" stroke="white" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
  <circle cx="50" cy="25" r="3" fill="white" opacity="0.8"/>
</svg>
