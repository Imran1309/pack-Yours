<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="happyGrad" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d946ef" /> <!-- Fuchsia -->
      <stop offset="50%" stop-color="#8b5cf6" /> <!-- Violet -->
      <stop offset="100%" stop-color="#06b6d4" /> <!-- Cyan -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Main Bubble Body -->
  <path d="M50 5 C25 5 5 25 5 50 C5 75 25 95 50 95 C75 95 95 75 95 50 C95 25 75 5 50 5 Z" fill="url(#happyGrad)" />
  <path d="M20 75 Q10 85 5 95 L30 85" fill="#8b5cf6" stroke="none" opacity="0.8"/>

  <!-- Robot Face -->
  <g transform="translate(0, 5)">
    <!-- Head Outline -->
    <path d="M25 35 A 25 25 0 0 1 75 35 V 55 A 25 25 0 0 1 25 55 Z" stroke="white" stroke-width="4" stroke-linecap="round" fill="none"/>
    
    <!-- Happy Eyes (Arches) -->
    <path d="M35 45 Q 40 40 45 45" stroke="white" stroke-width="4" stroke-linecap="round" />
    <path d="M55 45 Q 60 40 65 45" stroke="white" stroke-width="4" stroke-linecap="round" />
    
    <!-- Big Happy Smile -->
    <path d="M35 60 Q 50 75 65 60" stroke="white" stroke-width="4" stroke-linecap="round" />
    
    <!-- Antenna -->
    <path d="M50 10 V 5" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <circle cx="50" cy="5" r="4" fill="white"/>
    
    <!-- Plane taking off from the side -->
    <g transform="translate(68, 55) rotate(-15)">
      <path d="M0 0 L 10 -5 L 5 5 Z" fill="white" />
      <path d="M-10 10 Q -5 5 0 0" stroke="white" stroke-width="2"/>
    </g>
  </g>
</svg>
